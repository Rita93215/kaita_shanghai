<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>肥肥前進大上海 - 復古旅遊隨身誌</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700&family=Playfair+Display:ital,wght@0,600;1,400&family=Noto+Sans+TC:wght@400;500&display=swap" rel="stylesheet">

    <style>
        /* 核心海派配色與字體自訂 */
        :root {
            --color-shanghai-green: #1E4334;
            --color-brass-gold: #D4AF37;
            --color-brick-red: #8B263E;
            --color-vintage-bg: #F4F0EA;
        }

        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--color-vintage-bg);
            color: #2C2A29;
            -webkit-tap-highlight-color: transparent;
        }

        .font-shanghai-title {
            font-family: 'Noto Serif TC', 'Playfair Display', serif;
            font-weight: 700;
        }

        /* Art Deco 幾何邊框裝飾 */
        .art-deco-border {
            border: 3px double var(--color-brass-gold);
            position: relative;
        }
        .art-deco-corner::before {
            content: '';
            position: absolute;
            top: 2px; left: 2px; right: 2px; bottom: 2px;
            border: 1px solid var(--color-brass-gold);
            pointer-events: none;
        }

        /* 自訂滾動條（隱藏但保留功能，適合手機滑動） */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }

        /* 頁面切換動畫 */
        .page-content {
            display: none;
        }
        .page-content.active {
            display: block;
            animation: fadeIn 0.4s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 復古相框底片質感 */
        .vintage-photo {
            filter: sepia(0.15) contrast(1.05) brightness(0.95);
